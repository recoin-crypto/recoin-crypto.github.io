<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Casino</title>
    <script src="gradus-web.js"></script>
    <script src="database.js"></script>
    <script src="server.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: #ffd700; font-size: 2.5rem; margin: 1rem 0; }
        .user-bar {
            background: #1a1a4a;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .user-bar button { padding: 8px 16px; }
        .game-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #2a2a6a;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            font-size: 0.95rem;
        }
        .game-btn:hover { background: #3a3a8a; }
        .game-btn.active { background: #ffd700; color: #0a0a2e; }
        .game-section {
            display: none;
            background: #1a1a4a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .game-section.active { display: block; }

        .auth-form, .modal-content {
            background: #1a1a4a;
            border-radius: 15px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            width: 90%;
        }
        input, select, button {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #3a3a6a;
            background: #0a0a2e;
            color: #fff;
            margin: 6px 0;
            width: 100%;
            font-size: 1rem;
        }
        button {
            background: #4f46e5;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #4338ca; }
        button:disabled { background: #555; cursor: not-allowed; }
        .balance { font-size: 1.8rem; color: #ffd700; font-weight: bold; }
        .slot-machine { display: flex; justify-content: center; gap: 15px; font-size: 3rem; }
        .wheel {
            width: 200px; height: 200px; border-radius: 50%;
            border: 5px solid #fff; margin: 20px auto;
            background: conic-gradient(#4caf50 0deg 120deg, #f44336 120deg 360deg);
        }

        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content { text-align: center; }

        /* Адаптивность */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .game-btn { font-size: 0.85rem; padding: 8px 12px; }
            .slot-machine { font-size: 2rem; }
            .user-bar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Cosmo Casino</h1>
    <div class="user-bar">
        <span class="balance" id="balanceDisplay">0.00 ₽</span>
        <div id="authControls">
            <button onclick="showAuth()">Войти / Регистрация</button>
        </div>
    </div>

    <div class="game-menu">
        <button class="game-btn active" data-game="rocket">Ракета</button>
        <button class="game-btn" data-game="slots">Слоты</button>
        <button class="game-btn" data-game="guess">Угадайка</button>
        <button class="game-btn" data-game="wheel">Колесо фортуны</button>
        <button class="game-btn" data-game="daily">Гонки (бесплатно)</button>
        <button class="game-btn" data-game="profile">Профиль</button>
    </div>

    <!-- Игра: Ракета -->
    <div id="rocket" class="game-section active">
        <h2>Ракета</h2>
        <p>Ставка: <input type="number" id="rocketBet" min="7.5" step="0.1" placeholder="Сумма"></p>
        <button id="startRocket">Запустить</button>
        <button id="cashoutRocket" disabled>Забрать (x<span id="rocketCoeff">1.00</span>)</button>
        <div id="rocketCanvas" style="width:100%; height:200px; background:#000; margin-top:10px; position:relative;">
            <div id="rocketLine" style="position:absolute; bottom:0; left:0; height:100%; width:2px; background:red;"></div>
        </div>
    </div>

    <!-- Слоты -->
    <div id="slots" class="game-section">
        <h2>Слоты</h2>
        <p>Ставка: <input type="number" id="slotBet" min="7.5" step="0.1" placeholder="Сумма"></p>
        <button id="spinSlots">Крутить</button>
        <div class="slot-machine" id="slotResult">
            <span>🍒</span><span>🍒</span><span>🍒</span>
        </div>
    </div>

    <!-- Угадайка -->
    <div id="guess" class="game-section">
        <h2>Угадайка</h2>
        <p>Ставка: <input type="number" id="guessBet" min="7.5" step="0.1" placeholder="Сумма"></p>
        <div style="display:flex; gap:5px; flex-wrap:wrap; margin-top:10px;">
            <button onclick="playGuess('number', 1)">1</button>
            <button onclick="playGuess('number', 2)">2</button>
            <button onclick="playGuess('number', 3)">3</button>
            <button onclick="playGuess('number', 4)">4</button>
            <button onclick="playGuess('number', 5)">5</button>
            <button onclick="playGuess('number', 6)">6</button>
            <button onclick="playGuess('group', 'low')">Меньше (1-3)</button>
            <button onclick="playGuess('group', 'high')">Больше (4-6)</button>
        </div>
    </div>

    <!-- Колесо фортуны -->
    <div id="wheel" class="game-section">
        <h2>Колесо фортуны</h2>
        <p>Ставка: <input type="number" id="wheelBet" min="7.5" step="0.1" placeholder="Сумма"></p>
        <button id="spinWheel">Крутить</button>
        <div class="wheel" id="wheelCanvas"></div>
    </div>

    <!-- Ежедневные гонки -->
    <div id="daily" class="game-section">
        <h2>Ежедневные гонки</h2>
        <p>Выберите гонщика (бесплатно):</p>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="dailyRace(1)">🚗 Красный</button>
            <button onclick="dailyRace(2)">🚙 Синий</button>
            <button onclick="dailyRace(3)">🏎️ Зеленый</button>
            <button onclick="dailyRace(4)">🚕 Желтый</button>
        </div>
    </div>

    <!-- Профиль -->
    <div id="profile" class="game-section">
        <h2>Профиль</h2>
        <p>Email: <span id="profileEmail">—</span></p>
        <p>Сыграно игр: <span id="profileGames">0</span></p>
        <button id="attachEmailBtn" onclick="prepareAttachEmail()">Привязать почту (+15 ₽)</button>

        <h3>Пополнить</h3>
        <input type="number" id="depositAmount" min="15" placeholder="Сумма">
        <input type="email" id="depositEmail" placeholder="Email для уведомления">
        <button onclick="prepareDeposit()">Отправить запрос</button>

        <h3>Вывести</h3>
        <input type="number" id="withdrawAmount" min="50" placeholder="Сумма">
        <button id="withdrawBtn" disabled onclick="prepareWithdraw()">Запросить вывод</button>
    </div>
</div>

<!-- Модальное окно капчи -->
<div class="modal-overlay" id="captchaModal">
    <div class="modal-content">
        <h3>Подтвердите действие</h3>
        <div id="captchaBox"></div>
        <button id="captchaConfirm">Отправить</button>
        <button id="captchaCancel" style="background:#666;">Отмена</button>
    </div>
</div>

<!-- Модальное окно авторизации -->
<div id="authModal" class="auth-form" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1001; width:90%; max-width:400px;">
    <h2>Вход / Регистрация</h2>
    <input type="text" id="loginUser" placeholder="Логин">
    <input type="password" id="loginPass" placeholder="Пароль">
    <input type="email" id="loginEmail" placeholder="Email (необязательно, +15 ₽)">
    <button onclick="prepareLogin()">Войти / Зарегистрироваться</button>
    <button onclick="closeAuth()" style="background:#666;">Закрыть</button>
</div>

<script src="client.js"></script>
<script src="core.js"></script>
<script src="site.js"></script>
</body>
</html>
